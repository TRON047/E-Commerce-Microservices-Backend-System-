server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # ── Product Service ──────────────────────────────────────────────────
        - id: product-service
          uri: lb://product-service        # lb:// = Eureka load-balanced
          predicates:
            - Path=/api/products/**
          filters:
            - name: CircuitBreaker
              args:
                name: productServiceCB
                fallbackUri: forward:/fallback/products

        # ── Order Service ────────────────────────────────────────────────────
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: orderServiceCB
                fallbackUri: forward:/fallback/orders

        # ── Notification Service (health check only) ──────────────────────
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

      # Global CORS — adjust origins for production
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

      default-filters:
        # Adds X-Response-Time header to every response
        - AddResponseHeader=X-Response-Time, ${spring.application.name}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
